<!DOCTYPE html>
<html>
<head><title>YouTube</title></head>
<body>
  <ytd-app>
    <ytd-search class="style-scope ytd-page-manager">
      <ytd-two-column-search-results-renderer class="style-scope ytd-search">
        <ytd-section-list-renderer class="style-scope ytd-two-column-search-results-renderer">
          <div id="contents" class="style-scope ytd-section-list-renderer">
            <ytd-item-section-renderer class="style-scope ytd-section-list-renderer">
              <div id="contents" class="style-scope ytd-item-section-renderer">
                <ytd-video-renderer class="style-scope ytd-item-section-renderer">
                  <div id="dismissible" class="style-scope ytd-video-renderer">
                    <div class="text-wrapper style-scope ytd-video-renderer">
                      <div id="meta" class="style-scope ytd-video-renderer">
                        <h3 class="title-and-badge style-scope ytd-video-renderer">
                          <a id="video-title" class="style-scope ytd-video-renderer" href="/watch?v=aaa000000aa">
                            Non-Whitelisted Channel 1 Video
                          </a>
                        </h3>
                      </div>
                      <div id="channel-info" class="style-scope ytd-video-renderer">
                        <a id="channel-thumbnail" class="style-scope ytd-video-renderer" href="/@NonWhitelistedChannel1">
                        </a>
                        <ytd-channel-name id="channel-name" class="style-scope ytd-video-renderer">
                          <a class="yt-simple-endpoint style-scope yt-formatted-string" href="/@NonWhitelistedChannel1">Non-Whitelisted Channel 1</a>
                        </ytd-channel-name>
                      </div>
                    </div>
                  </div>
                </ytd-video-renderer>
                <ytd-video-renderer class="style-scope ytd-item-section-renderer">
                  <div id="dismissible" class="style-scope ytd-video-renderer">
                    <div class="text-wrapper style-scope ytd-video-renderer">
                      <div id="meta" class="style-scope ytd-video-renderer">
                        <h3 class="title-and-badge style-scope ytd-video-renderer">
                          <a id="video-title" class="style-scope ytd-video-renderer" href="/watch?v=bbb000000bb">
                            Non-Whitelisted Channel 2 Video
                          </a>
                        </h3>
                      </div>
                      <div id="channel-info" class="style-scope ytd-video-renderer">
                        <a id="channel-thumbnail" class="style-scope ytd-video-renderer" href="/@NonWhitelistedChannel2">
                        </a>
                        <ytd-channel-name id="channel-name" class="style-scope ytd-video-renderer">
                          <a class="yt-simple-endpoint style-scope yt-formatted-string" href="/@NonWhitelistedChannel2">Non-Whitelisted Channel 2</a>
                        </ytd-channel-name>
                      </div>
                    </div>
                  </div>
                </ytd-video-renderer>
                <ytd-video-renderer class="style-scope ytd-item-section-renderer">
                  <div id="dismissible" class="style-scope ytd-video-renderer">
                    <div class="text-wrapper style-scope ytd-video-renderer">
                      <div id="meta" class="style-scope ytd-video-renderer">
                        <h3 class="title-and-badge style-scope ytd-video-renderer">
                          <a id="video-title" class="style-scope ytd-video-renderer" href="/watch?v=ccc000000cc">
                            Whitelisted Channel 1 Video 1
                          </a>
                        </h3>
                      </div>
                      <div id="channel-info" class="style-scope ytd-video-renderer">
                        <a id="channel-thumbnail" class="style-scope ytd-video-renderer" href="/@WhitelistedChannel1">
                        </a>
                        <ytd-channel-name id="channel-name" class="style-scope ytd-video-renderer">
                          <a class="yt-simple-endpoint style-scope yt-formatted-string" href="/@WhitelistedChannel1">Whitelisted Channel 1</a>
                        </ytd-channel-name>
                      </div>
                    </div>
                  </div>
                </ytd-video-renderer>
                <ytd-video-renderer class="style-scope ytd-item-section-renderer">
                  <div id="dismissible" class="style-scope ytd-video-renderer">
                    <div class="text-wrapper style-scope ytd-video-renderer">
                      <div id="meta" class="style-scope ytd-video-renderer">
                        <h3 class="title-and-badge style-scope ytd-video-renderer">
                          <a id="video-title" class="style-scope ytd-video-renderer" href="/watch?v=eee000000ee">
                            Whitelisted Channel 2 Video
                          </a>
                        </h3>
                      </div>
                      <div id="channel-info" class="style-scope ytd-video-renderer">
                        <a id="channel-thumbnail" class="style-scope ytd-video-renderer" href="/@WhitelistedChannel2">
                        </a>
                        <ytd-channel-name id="channel-name" class="style-scope ytd-video-renderer">
                          <a class="yt-simple-endpoint style-scope yt-formatted-string" href="/@WhitelistedChannel2">Whitelisted Channel 2</a>
                        </ytd-channel-name>
                      </div>
                    </div>
                  </div>
                </ytd-video-renderer>
              </div>
            </ytd-item-section-renderer>
          </div>
        </ytd-section-list-renderer>
      </ytd-two-column-search-results-renderer>
    </ytd-search>
  </ytd-app>
</body>
</html>
